<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ISSAC AI Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        ISSAC INTELLIGENCE (XM1)
    </header>

    <div class="chat-container">
        <div id="chat-box">
            <div class="message bot">Halo! Saya ISSAC (XM1). Kamu mau tahu apa tentang ISC?</div>
        </div>

        <form class="input-area" id="chat-form">
            <input type="text" id="user-input" placeholder="Ketik pesan..." autocomplete="off">
            <button type="submit" id="send-btn">Kirim</button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
